name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

  workflow_dispatch:
permissions:
  contents: read

jobs:
  build:
    name: Build, Test, and Sonar Scan
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn -B -ntp clean compile

      - name: Run unit tests and coverage check
        run: mvn -B -ntp verify

      - name: Sonar scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' }}
        run: |
          SONAR_URL="${SONAR_HOST_URL:-https://sonarcloud.io}"
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            mvn -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
              -Dsonar.organization="${SONAR_ORGANIZATION}" \
              -Dsonar.token="${SONAR_TOKEN}"
          else
            mvn -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
              -Dsonar.token="${SONAR_TOKEN}"
          fi

      - name: Sonar scan skipped notice
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' }}
        run: echo "Skipping Sonar scan. Configure SONAR_TOKEN and SONAR_PROJECT_KEY repository secrets to enable it."

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}

    env:
      MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21 for publishing
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set project version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B -ntp versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false

      - name: Publish artifacts
        run: mvn -B -ntp -P release deploy -DskipTests
